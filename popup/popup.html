<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poke-Idle Auto-Clicker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="../icons/icon48.png" alt="Logo" width="32" height="32" />
    <h1>Poke-Idle Auto-Clicker</h1>
  </header>

  <section class="status-row">
    <span id="status-dot" class="dot inactive"></span>
    <span id="status-text">Inactif</span>
    <button id="toggle-btn" class="btn-toggle">Activer</button>
  </section>

  <section class="interval-row">
    <label for="interval-input">Intervalle (s)</label>
    <input
      type="number"
      id="interval-input"
      min="1"
      max="60"
      value="5"
    />
  </section>

  <section class="logs-section">
    <h2>Activité récente</h2>
    <ul id="logs-list"></ul>
  </section>

  <script src="popup.js"></script>
</body>
</html>
